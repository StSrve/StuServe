<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Students — StuServe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --navy: #0f1c2e;
            --steel: #3a5068;
            --blush: #c8a4a5;
            --lavender: #b8b4c0;
            --pink: #e8cdd0;
            --pink-light: #f4e4e6;
            --white: #ffffff;
            --text-dark: #0f1c2e;
            --text-mid: #3a5068;
            --text-light: #7a8fa6;
            --accent: #c44269;
            --accent-glow: rgba(196, 66, 105, 0.15);
            --radius: 12px;
            --radius-lg: 24px;
            --transition: .28s cubic-bezier(.4, 0, .2, 1);
            --font-display: 'Cormorant Garamond', serif;
            --font-body: 'DM Sans', sans-serif;
            --shadow-sm: 0 2px 8px rgba(15, 28, 46, .06);
            --shadow-md: 0 8px 32px rgba(15, 28, 46, .08);
            --shadow-lg: 0 16px 48px rgba(15, 28, 46, .12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            color: var(--text-mid);
            background: linear-gradient(135deg, #fbf7f7 0%, #eef3f9 100%);
            min-height: 100vh;
            padding-top: 100px;
            padding-bottom: 60px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ── NAVBAR ── */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 0 24px;
            height: 72px;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(15, 28, 46, 0.06);
            transition: box-shadow var(--transition);
        }

        .navbar__inner {
            max-width: 1160px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar__logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar__logo img {
            height: 50px;
            width: auto;
            mix-blend-mode: multiply;
        }

        .navbar__logo span {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--navy);
        }

        /* Nav Badge styling */
        .nav-badge-container {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .nav-badge {
            background: var(--accent);
            color: var(--white);
            border-radius: 50%;
            min-width: 18px;
            height: 18px;
            font-size: 0.65rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: -6px;
            right: -12px;
            padding: 0 4px;
            animation: pulse-badge 2s infinite;
        }

        @keyframes pulse-badge {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(196, 66, 105, 0.7);
            }

            70% {
                transform: scale(1.1);
                box-shadow: 0 0 0 6px rgba(196, 66, 105, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(196, 66, 105, 0);
            }
        }

        .navbar__links {
            display: flex;
            align-items: center;
            gap: 44px;
            list-style: none;
        }

        .navbar__links a {
            font-size: .875rem;
            font-weight: 500;
            color: var(--text-mid);
            transition: color var(--transition);
        }

        .navbar__links a:hover {
            color: var(--accent);
        }

        .navbar__actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* Dynamic buttons */
        .btn {
            font-family: var(--font-body);
            font-size: .9rem;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 50px;
            border: 1.5px solid transparent;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .btn-primary {
            background: var(--navy);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--steel);
            transform: translateY(-2px);
        }

        .btn-accent {
            background: var(--accent);
            color: var(--white);
        }

        .btn-accent:hover {
            background: #a8364f;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .btn-outline {
            background: transparent;
            color: var(--navy);
            border-color: var(--navy);
        }

        .btn-outline:hover {
            background: var(--navy);
            color: var(--white);
            transform: translateY(-2px);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-dark);
            border-color: rgba(15, 28, 46, 0.15);
        }

        .btn-ghost:hover {
            background: rgba(15, 28, 46, 0.05);
        }

        .container {
            max-width: 1160px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ── HERO BANNER ── */
        .directory-hero {
            background: var(--navy);
            color: var(--white);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        .directory-hero::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            opacity: 0.2;
            pointer-events: none;
        }

        .directory-hero__title {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .directory-hero__sub {
            font-size: 1rem;
            color: var(--pink-light);
            margin-bottom: 32px;
            max-width: 500px;
            line-height: 1.5;
        }

        /* Search bar */
        .search-bar {
            background: var(--white);
            border-radius: 50px;
            padding: 8px;
            display: flex;
            gap: 12px;
            box-shadow: var(--shadow-md);
            max-width: 800px;
        }

        .search-input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            font-size: 1.1rem;
            color: var(--text-light);
        }

        .search-input {
            width: 100%;
            border: none;
            outline: none;
            padding: 12px 12px 12px 48px;
            font-family: var(--font-body);
            font-size: 0.95rem;
            color: var(--text-dark);
            border-radius: 50px;
        }

        .filter-select {
            padding: 0 24px;
            border: none;
            border-left: 1.5px solid rgba(15, 28, 46, 0.12);
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-dark);
            outline: none;
            background: transparent;
            cursor: pointer;
        }

        @media (max-width: 650px) {
            .search-bar {
                flex-direction: column;
                border-radius: var(--radius);
                padding: 16px;
            }

            .filter-select {
                border-left: none;
                border-top: 1.5px solid rgba(15, 28, 46, 0.12);
                padding: 12px 4px 0 4px;
            }

            .search-input {
                padding: 12px 12px 12px 32px;
            }

            .search-icon {
                left: 6px;
            }
        }

        /* ── DIRECTORY GRID ── */
        .directory-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .directory-count {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-light);
        }

        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }

        /* Student Card */
        .student-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(15, 28, 46, 0.06);
            padding: 30px 24px;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .student-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(196, 66, 105, 0.15);
        }

        .card-avatar {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            background: var(--pink-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            margin-bottom: 16px;
            border: 3px solid var(--pink-light);
            box-shadow: var(--shadow-sm);
        }

        .card-rating {
            background: var(--pink-light);
            color: var(--accent);
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 3px;
            margin-bottom: 12px;
        }

        .card-name {
            font-family: var(--font-display);
            font-size: 1.45rem;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 6px;
            line-height: 1.2;
        }

        .card-headline {
            font-size: 0.82rem;
            color: var(--text-light);
            margin-bottom: 16px;
            height: 38px;
            overflow: hidden;
            display: -webkit-box;
            webkit-line-clamp: 2;
            webkit-box-orient: vertical;
            line-height: 1.4;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-bottom: 20px;
            height: 52px;
            overflow: hidden;
        }

        .card-tag {
            background: #fafbfc;
            color: var(--text-mid);
            font-size: 0.72rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid rgba(15, 28, 46, 0.06);
        }

        .card-footer {
            width: 100%;
            margin-top: auto;
            border-top: 1px solid rgba(15, 28, 46, 0.06);
            padding-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-price-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-light);
            font-weight: 700;
            text-align: left;
        }

        .card-price-val {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--accent);
            text-align: left;
            margin-top: 2px;
        }

        .card-btn {
            font-size: 0.78rem;
            padding: 8px 16px;
        }
    </style>
</head>

<body>

    <!-- ── NAVBAR ── -->
    <nav class="navbar" id="navbar">
        <div class="navbar__inner">
            <a href="index.html" class="navbar__logo">
                <img src="stuserveLogo.png" alt="StuServe Logo">
                <span>StuServe</span>
            </a>
            <ul class="navbar__links">
                <li><a href="Services.html">Browse Services</a></li>
                <li><a href="Find Students.html" style="color:var(--accent);">Find Students</a></li>
                <li><a href="Post a Job.html">Post a Job</a></li>
                <li><a href="Messages.html" id="navMessagesLink">Messages</a></li>
                <li><a href="index.html">About</a></li>
                <li><a href="index.html">Contact</a></li>
            </ul>
            <div class="navbar__actions">
                <!-- Populated dynamically -->
            </div>
        </div>
    </nav>

    <!-- ── DIRECTORY CONTENT ── -->
    <div class="container">

        <!-- Hero block with search & filter -->
        <div class="directory-hero">
            <h1 class="directory-hero__title">Discover Student Talent</h1>
            <p class="directory-hero__sub">Browse and hire top-rated Bahraini students for design, tutoring, editing,
                and more.</p>

            <div class="search-bar">
                <div class="search-input-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" class="search-input"
                        placeholder="Search by name, skills, or services..." oninput="filterDirectory()">
                </div>
                <select id="categoryFilter" class="filter-select" onchange="filterDirectory()">
                    <option value="all">All Categories</option>
                    <option value="design">Graphic Design</option>
                    <option value="tutor">Tutoring</option>
                    <option value="photography">Photography</option>
                    <option value="video">Video Editing</option>
                    <option value="writing">Writing & Content</option>
                </select>
            </div>
        </div>

        <!-- Directory Header -->
        <div class="directory-title-row">
            <h2 style="font-family:var(--font-display); font-size:1.8rem; font-weight:600; color:var(--navy);">Available
                Talent</h2>
            <div id="studentCount" class="directory-count">Showing 0 students</div>
        </div>

        <!-- Grid of students -->
        <div id="studentGrid" class="student-grid">
            <!-- Dynamically populated student cards -->
        </div>

    </div>

    <!-- ── SCRIPTS ── -->
    <script>
        // ── DEFAULT MOCK DATA ──
        const defaultStudents = [];

        const avatarEmojiMap = {
            "avatar1": "🎨", "avatar2": "👨‍💻", "avatar3": "📸", "avatar4": "🎬", "avatar5": "📚",
            "avatar6": "✍️", "avatar7": "🔬", "avatar8": "🎹", "avatar9": "🚀", "avatar10": "🌟"
        };

        let allStudents = [];

        let profilesSubscription = null;

        function loadDirectoryFromCloud() {
            const syncClient = window._sb || window._fb;
            console.log("Supabase available:", !!window._sb);
            if (syncClient && syncClient.subscribeToProfilesFromCloud) {
                if (profilesSubscription) {
                    profilesSubscription();
                }
                profilesSubscription = syncClient.subscribeToProfilesFromCloud((cloudProfiles) => {
                    console.log("Cloud profiles:", cloudProfiles);
                    if (cloudProfiles && cloudProfiles.length > 0) {
                        cloudProfiles.forEach(prof => {
                            localStorage.setItem('profile_' + prof.email, JSON.stringify(prof));
                        });
                        loadDirectoryData();
                    }
                });
            } else if (syncClient && syncClient.loadAllProfilesFromCloud) {
                // Fallback to one-time load if subscribe is unavailable
                syncClient.loadAllProfilesFromCloud().then(cloudProfiles => {
                    console.log("Cloud profiles:", cloudProfiles);
                    if (cloudProfiles && cloudProfiles.length > 0) {
                        cloudProfiles.forEach(prof => {
                            localStorage.setItem('profile_' + prof.email, JSON.stringify(prof));
                        });
                        loadDirectoryData();
                    }
                });
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            initializeUserSession();

            // Read URL query parameters to pre-fill search inputs
            const urlParams = new URLSearchParams(window.location.search);
            const searchParam = urlParams.get('search') || urlParams.get('query');
            if (searchParam) {
                const searchInput = document.getElementById('searchInput');
                if (searchInput) {
                    searchInput.value = searchParam;
                }
            }
            const categoryParam = urlParams.get('category');
            if (categoryParam) {
                const catFilter = document.getElementById('categoryFilter');
                if (catFilter) {
                    catFilter.value = categoryParam;
                }
            }

            loadDirectoryData();

            if (window._sb || window._fb) {
                loadDirectoryFromCloud();
            } else {
                window.addEventListener('supabaseReady', loadDirectoryFromCloud, { once: true });
            }
        });

        function initializeUserSession() {
            const userStr = localStorage.getItem('loggedInUser');
            const navActions = document.querySelector('.navbar__actions');

            // Handle Messages link visibility and dynamic badge
            const navMessagesLink = document.getElementById('navMessagesLink');
            if (navMessagesLink) {
                if (userStr) {
                    const user = JSON.parse(userStr);
                    navMessagesLink.style.display = 'inline-flex';
                    navMessagesLink.classList.add('nav-badge-container');

                    // Remove existing badge if any
                    const existingBadge = navMessagesLink.querySelector('.nav-badge');
                    if (existingBadge) existingBadge.remove();

                    // Count unread messages
                    const messages = JSON.parse(localStorage.getItem('stuserve_messages') || '[]');
                    const unreadCount = messages.filter(m => m.receiver === user.email && !m.read).length;

                    if (unreadCount > 0) {
                        const badge = document.createElement('span');
                        badge.className = 'nav-badge';
                        badge.textContent = unreadCount;
                        navMessagesLink.appendChild(badge);
                    }
                } else {
                    navMessagesLink.style.display = 'none';
                }
            }

            // Handle Dashboard link visibility dynamically in navbar
            const navbarLinksList = document.querySelector('.navbar__links');
            if (navbarLinksList) {
                let navDashboardLink = document.getElementById('navDashboardLink');
                if (userStr) {
                    if (!navDashboardLink) {
                        const li = document.createElement('li');
                        li.innerHTML = '<a href="Dashboard.html" id="navDashboardLink">Dashboard</a>';
                        // Insert after Messages link or append
                        const messagesLi = Array.from(navbarLinksList.children).find(child => child.querySelector('#navMessagesLink'));
                        if (messagesLi) {
                            navbarLinksList.insertBefore(li, messagesLi.nextSibling);
                        } else {
                            navbarLinksList.appendChild(li);
                        }
                    }
                } else {
                    if (navDashboardLink) {
                        navDashboardLink.parentElement.remove();
                    }
                }
            }

            if (userStr) {
                const user = JSON.parse(userStr);
                if (navActions) {
                    navActions.innerHTML = `
                        <div style="display:flex; align-items:center; gap:16px;">
                            <span style="font-family:var(--font-body); font-size:.9rem; font-weight:600; color:var(--text-dark);">
                                Hello, <span style="color:var(--accent);">${user.name}</span>!
                            </span>
                            ${user.role === 'student' ? `
                                <a href="Profile.html" class="btn btn-outline" style="padding:10px 20px; font-size:.85rem; text-decoration:none; display:inline-flex; align-items:center;">
                                    My Profile
                                </a>
                            ` : ''}
                            <button class="btn btn-ghost" style="padding:10px 20px; font-size:.85rem;" onclick="handleLogout()">
                                Log Out
                            </button>
                        </div>
                    `;
                }
            } else {
                if (navActions) {
                    navActions.innerHTML = `
                        <a href="index.html" class="btn btn-primary" style="padding:10px 20px; font-size:.85rem;">
                            Log In / Sign Up
                        </a>
                    `;
                }
            }
        }

        function handleLogout() {
            localStorage.removeItem('loggedInUser');
            window.location.reload();
        }

        function loadDirectoryData() {
            allStudents = [];

            // 1. Gather all student profiles saved in localStorage
            const keys = Object.keys(localStorage);
            const localStudentEmails = [];

            keys.forEach(key => {
                if (key.startsWith('profile_')) {
                    const prof = JSON.parse(localStorage.getItem(key));
                    localStudentEmails.push(prof.email);

                    // Deduce rating
                    let avgRating = "5.0";
                    let count = 0;
                    if (prof.reviews && Array.isArray(prof.reviews) && prof.reviews.length > 0) {
                        count = prof.reviews.length;
                        avgRating = (prof.reviews.reduce((sum, r) => sum + (r.rating || 0), 0) / count).toFixed(1);
                    }

                    // Deduce category based on skills
                    let cat = "design";
                    const skillsLower = (prof.skills || "").toLowerCase();
                    if (skillsLower.includes('tutor') || skillsLower.includes('math') || skillsLower.includes('physics') || skillsLower.includes('class') || skillsLower.includes('school')) {
                        cat = "tutor";
                    } else if (skillsLower.includes('photo') || skillsLower.includes('camera') || skillsLower.includes('shoot')) {
                        cat = "photography";
                    } else if (skillsLower.includes('video') || skillsLower.includes('edit') || skillsLower.includes('reel') || skillsLower.includes('motion')) {
                        cat = "video";
                    } else if (skillsLower.includes('write') || skillsLower.includes('content') || skillsLower.includes('article') || skillsLower.includes('blog')) {
                        cat = "writing";
                    }

                    allStudents.push({
                        email: prof.email,
                        name: prof.name,
                        headline: prof.headline,
                        price: prof.price,
                        skills: prof.skills,
                        avatar: prof.avatar,
                        category: cat,
                        rating: avgRating,
                        reviewCount: count
                    });
                }
            });

            // 2. Add default students if not already present in localStorage
            defaultStudents.forEach(def => {
                if (!localStudentEmails.includes(def.email)) {
                    allStudents.push(def);
                }
            });

            filterDirectory();
        }

        function filterDirectory() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const category = document.getElementById('categoryFilter').value;
            const grid = document.getElementById('studentGrid');
            grid.innerHTML = '';

            const filtered = allStudents.filter(student => {
                // Category filter
                if (category !== 'all') {
                    if (student.category !== category) return false;
                }

                // Search query filter
                if (query) {
                    const matchName = (student.name || "").toLowerCase().includes(query);
                    const matchHeadline = (student.headline || "").toLowerCase().includes(query);
                    const matchSkills = (student.skills || "").toLowerCase().includes(query);
                    return matchName || matchHeadline || matchSkills;
                }

                return true;
            });

            // Update title count
            document.getElementById('studentCount').textContent = `Showing ${filtered.length} student${filtered.length === 1 ? '' : 's'}`;

            if (filtered.length > 0) {
                filtered.forEach(student => {
                    const card = document.createElement('div');
                    card.className = 'student-card';

                    const avatarEmoji = avatarEmojiMap[student.avatar] || "🎓";
                    const ratingText = student.reviewCount > 0 ? `${student.rating} ★ (${student.reviewCount})` : "New Talent";

                    // Split skills into pills (max 4)
                    const skillPills = (student.skills || "").split(',').map(s => s.trim()).filter(Boolean).slice(0, 4);
                    const tagsHtml = skillPills.map(tag => `<span class="card-tag">${tag}</span>`).join('');

                    card.innerHTML = `
                        <div class="card-avatar">${avatarEmoji}</div>
                        <div class="card-rating">★ <span>${ratingText}</span></div>
                        <h3 class="card-name">${student.name}</h3>
                        <p class="card-headline">${student.headline}</p>
                        <div class="card-tags">${tagsHtml}</div>
                        <div class="card-footer">
                            <div>
                                <div class="card-price-label">Pricing</div>
                                <div class="card-price-val">${student.price}</div>
                            </div>
                            <a href="Profile.html?email=${student.email}" class="btn btn-primary card-btn">View Profile</a>
                        </div>
                    `;

                    grid.appendChild(card);
                });
            } else {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align:center; padding:60px 0; color:var(--text-light);">
                        <div style="font-size:3rem; margin-bottom:16px;">🔍</div>
